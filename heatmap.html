<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flight Paths Noise Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }

        #mapid {
            height: 100%;
            width: 100%;
        }

        #slider-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 999;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white background */
            padding: 10px;
            border-radius: 5px;
        }

        #slider-container label {
            font-family: sans-serif;
            display: block;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        #slider {
            display: block;
            width: 100%; /* Taking full width of the container */
        }
    </style>

</head>
<body>
<div id="slider-container">
    <label for="slider">Heatmap Intensity</label>
    <input type="range" min="1" max="1000" value="300" id="slider">
</div>
<div id="mapid"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.2/heatmap.min.js"></script>
<script src="https://cdn.rawgit.com/pa7/heatmap.js/develop/plugins/leaflet-heatmap/leaflet-heatmap.js"></script>

<script>
    let map = L.map('mapid').setView([47.6097, -122.3331], 9);
    let slider = document.getElementById('slider');
    // Each data point is represented by a 5-second interval, so 12 data points per minute.
    let formattedData = {};

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
    }).addTo(map);

    const cfg = {
        // Radius of 0.02 degrees is 0.87km at latitude 65, and 2.22km at the equator.
        // This is a reasonable start point for the radius.
        "radius": .02,
        "maxOpacity": .4,
        "blur": 1,

        // scales the radius based on map zoom
        "scaleRadius": true,

        // uses the data maximum within the current map boundaries
        // TODO: Make this toggleable.  This will ignore our custom "Max" value.
        //"useLocalExtrema": true,

        latField: 'la',
        lngField: 'ln',
        valueField: 'v'
    };
    const heatmapLayer = new HeatmapOverlay(cfg);

    // Function to calculate circle radius for area = 1km^2
    const calcRadiusInDegrees = (position, isLongitude = false) => {
        let rKm = Math.sqrt(1 / Math.PI);
        let rDeg = rKm / 111.32; // convert km to degree
        if (isLongitude) rDeg *= Math.cos(position.lat * Math.PI / 180);
        return rDeg;
    };

    map.on("moveend", function () {
        const currPosition = map.getCenter();
        console.debug(currPosition);
        // Multiply the radius so the data points blend together more smoothly.  Otherwise, we get
        // 1km dots everywhere.  Since we have 1.0 blurring, everything needs to be a bit larger.
        cfg.radius = calcRadiusInDegrees(currPosition, true) * 7;
        console.debug('Radius: ' + cfg.radius);
        heatmapLayer.cfg.radius = cfg.radius;
        window.location.hash = [currPosition.lat, currPosition.lng, map.getZoom(), slider.value].join(",");
    });

    // Function for setting heatmap data
    const setHeatmapData = (maxValue) => {
        console.debug('Setting heatmap data with max value: ' + maxValue);
        formattedData.max = maxValue;
        heatmapLayer.setData(formattedData);
    };

    // Debounce so we don't destroy GPUs as we slide through hundreds of values
    let isThrottled = false;
    let lastKnownValue = 0;
    slider.oninput = function () {
        lastKnownValue = this.value;

        if (!isThrottled) {
            isThrottled = true;

            setTimeout(() => {
                isThrottled = false;
                setHeatmapData(lastKnownValue);
                window.location.hash = [map.getCenter().lat, map.getCenter().lng, map.getZoom(), lastKnownValue].join(",");
            }, 75); // Delay in ms
        }
    }

    // Fetching and using the JSON data
    fetch('heatmap-grid.json')
        .then(response => response.json())
        .then(data => {
            formattedData = {
                // TODO: Check the math so we can explain what the slider means.
                data: data.map(item => ({la: item[0], ln: item[1], v: item[2]}))
            };

            if(window.location.hash !== "") {
                // Incoming link had settings.  Use them.
                const values = window.location.hash.substring(1).split(",");
                const lat = parseFloat(values[0]);
                const lng = parseFloat(values[1]);
                const zoom = parseInt(values[2]);
                const intensity = parseInt(values[3]);
                map.setView([lat, lng], zoom);
                slider.value = intensity;
                setHeatmapData(intensity);
            }else{
                setHeatmapData(slider.value);
            }

            setHeatmapData(slider.value);
            heatmapLayer.addTo(map);
        });
</script>
</body>
</html>
